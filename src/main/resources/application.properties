spring.application.name=assetflow
spring.profiles.default=dev
server.port=${SERVER_PORT:8080}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/assetflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA baseline (override per profile when needed)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Session/cookie defaults (override in prod profile)
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.servlet.session.cookie.name=ASSETFLOW_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
