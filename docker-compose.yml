services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/assetflow
      DB_USERNAME: assetflow
      DB_PASSWORD: assetflow
      CORS_ALLOWED_ORIGINS: http://localhost:8081
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAME_SITE: lax
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pg_data:
